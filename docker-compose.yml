version: "3.9"

services:
  db:
    image: postgres:16
    container_name: vehicle_db
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vehicledamage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: vehicle_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override paths for Docker filesystem
      MODEL_PATH: /app/models/yolo11m_best.pt
      # Override the DB URL to point to the db service instead of localhost
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/vehicledamage
      # Use host.docker.internal so the container can reach Ollama running on your Mac
      LLM_BASE_URL: http://host.docker.internal:11434/v1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount models folder so weights don't need to be rebuilt into the image
      - ./models:/app/models:ro

volumes:
  pgdata:
