name: vehicle_damage_app
description: Vehicle Damage Assessment Mobile Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  
  # Image handling
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  file_picker: ^6.1.1
  # image_cropper: ^5.0.1  # Disabled - incompatible with web
  
  # Networking
  http: ^1.2.0
  dio: ^5.4.0
  
  # State management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.10
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Utils
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  intl: ^0.19.0
  
  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
